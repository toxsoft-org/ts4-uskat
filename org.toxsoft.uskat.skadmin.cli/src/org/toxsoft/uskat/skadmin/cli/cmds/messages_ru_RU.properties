BATCH_ARG_ARGS_DESCR       = Список фактических значений аргументов для выполнения скрипта. В сценарии эти значения доступны через параметры контекста $1, $2,...$N
BATCH_ARG_CHARSET_DESCR    = Кодировка текстового файла
BATCH_ARG_EXIT_DESCR       = Признак завершения работы консоли после выполнения команд файла
BATCH_ARG_FILE_DESCR       = Текстовый файл с командами для выполнения
BATCH_ARG_FILE_NAME        = Имя файла
BATCH_CMD_NAME             = Выполнение сценария
CD_ARG_SECTION_DESCR       = Раздел на который требуется осуществить переход
CD_ARG_SECTION_NAME        = Имя раздела
CD_CMD_DESCR               = Смена текущего раздела команд
CD_CMD_NAME                = Смена раздела
CLEAR_CMD_NAME             = Очистка экрана
HAS_ARG_NAME_DESCR         = Имя проверяемого параметра. ВНИМАНИЕ: без префикса '$'
HAS_CMD_DESCR              = Возвращает  признак существования параметра в текущем контексте
HAS_CMD_RESULT_DESCR       = Признак существования параметра
HELP_ARG_ALL_DESCR         = Вывести справку по всем командам
HELP_ARG_ALL_NAME          = Флаг
HELP_ARG_CMD_DESCR         = Имя команды по которой требуется вывести детальную справку
HELP_ARG_CMD_NAME          = Имя команды
HELP_CMD_DESCR             = Справка по командам и аргументам
HELP_CMD_NAME              = Помощь
LS_ARG_DESCRIPTION_DESCR   = Вывести описание команд
LS_ARG_DESCRIPTION_NAME    = Флаг
LS_ARG_SECTION_DESCR       = Раздел по которому требуется вывести информацию. Пустая строка: вывод по текущему разделу
LS_ARG_SECTION_NAME        = Имя раздела
LS_CMD_DESCR               = Вывод на экран разделов и команд доступных в разделе
LS_CMD_NAME                = Список команд и разделов
