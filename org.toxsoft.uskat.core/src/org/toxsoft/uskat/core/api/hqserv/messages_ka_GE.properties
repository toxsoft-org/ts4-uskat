STR_CLOSED                     = დახურულია
STR_CLOSED_D                   = უკვე დახურულია, მოთხოვნის ობიექტი გამოუყენებელია
STR_EXECUTING                  = შესრულება
STR_EXECUTING_D                = მოთხოვნა ახლა სრულდება
STR_FAILED                     = წარუმატებელია
STR_FAILED_D                   = მოთხოვნის შესრულება ვერ მოხერხდა რაიმე მიზეზით (ტაიმაუტი, კავშირის არარსებობა და ა.შ.)
STR_MAX_AGGREGATION_INTERVAL   = აგრეგაციის ინტერვალი
STR_MAX_AGGREGATION_INTERVAL_D = აგრეგაციის დროის ინტერვალის ხანგრძლივობა (მწმ)
STR_MAX_AGGREGATION_START      = აგრეგაციის დასაწყისი
STR_MAX_AGGREGATION_START_D    = დროის ნიშნული, როდესაც მონაცემთა აგრეგაცია იწყება მითითებული ინტერვალებით
STR_MAX_EXECUTION_TIME         = ტაიმაუტი (მწმ)
STR_MAX_EXECUTION_TIME_D       = შეკითხვის შესრულების მაქსიმალური დაშვებული დრო მილიწამებში
STR_PREPARED                   = მომზადებული
STR_PREPARED_D                 = მოთხოვნა მზადაა შესასრულებლად
STR_READY                      = მზადაა
STR_READY_D                    = მოთხოვნის მონაცემები წარმატებით იქნა მიღებული და მზადაა
STR_UNPREPARED                 = მოუმზადებელი
STR_UNPREPARED_D               = მოთხოვნა საწყის მოუმზადებელ მდგომარეობაშია
